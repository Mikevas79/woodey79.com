<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Login to Woodey79's admin area." />
  <title>Login — Woodey79</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧱</text></svg>" />
  <style>
    /* Password input group */
    .input-group {
      position: relative;
      display: flex;
      align-items: center;
    }

    .input-group .form-input {
      padding-right: 2.75rem;
    }

    .toggle-password {
      position: absolute;
      right: 0.75rem;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      color: var(--text-muted);
      padding: 0;
      line-height: 1;
      transition: color var(--transition-fast);
    }

    .toggle-password:hover {
      color: var(--text-secondary);
    }

    /* Remember me checkbox */
    .checkbox-label {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      cursor: pointer;
      font-size: 0.88rem;
      color: var(--text-secondary);
    }

    .checkbox-label input[type="checkbox"] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent-start);
      cursor: pointer;
    }

    /* Back to site link */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.85rem;
      color: var(--text-muted);
      transition: color var(--transition-fast);
      margin-bottom: 1.5rem;
    }

    .back-link:hover {
      color: var(--text-accent);
    }
  </style>
</head>
<body>

  <!-- Background -->
  <div class="login-bg" aria-hidden="true"></div>

  <!-- Animated grid (reused from hero) -->
  <div class="hero-grid" style="position: fixed; opacity: 0.3;" aria-hidden="true"></div>

  <!-- ==================== LOGIN PAGE ==================== -->
  <main class="login-page">
    <div>
      <!-- Back link -->
      <a href="index.html" class="back-link">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Back to site
      </a>

      <!-- Login Card -->
      <div class="login-card">
        <div class="login-logo">
          <div class="logo-text">&lt;woodey79/&gt;</div>
          <p>Admin Area</p>
        </div>

        <!-- Login Form -->
        <form id="login-form" novalidate>
          <div class="form-group">
            <label class="form-label" for="login-username">Username or Email</label>
            <input
              type="text"
              id="login-username"
              name="username"
              class="form-input"
              placeholder="woodey79"
              required
              autocomplete="username"
            />
          </div>

          <div class="form-group">
            <label class="form-label" for="login-password">Password</label>
            <div class="input-group">
              <input
                type="password"
                id="login-password"
                name="password"
                class="form-input"
                placeholder="••••••••"
                required
                autocomplete="current-password"
              />
              <button type="button" class="toggle-password" aria-label="Toggle password visibility">👁️</button>
            </div>
          </div>

          <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem;">
            <label class="checkbox-label">
              <input type="checkbox" name="remember" />
              Remember me
            </label>
            <a href="#" style="font-size: 0.85rem; color: var(--text-accent); transition: color var(--transition-fast);">
              Forgot password?
            </a>
          </div>

          <button type="submit" class="btn btn-primary w-full" style="justify-content: center;">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4M10 17l5-5-5-5M15 12H3"/>
            </svg>
            Sign In
          </button>
        </form>

        <!-- Divider -->
        <div class="login-divider">or</div>

        <!-- GitHub OAuth (placeholder) -->
        <button
          type="button"
          class="btn btn-secondary w-full"
          style="justify-content: center;"
          onclick="Toast && Toast.show('GitHub OAuth coming soon!', 'success')"
        >
          <svg width="18" height="18" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/>
          </svg>
          Continue with GitHub
        </button>

        <p style="text-align: center; margin-top: 1.5rem; font-size: 0.82rem; color: var(--text-muted);">
          Don't have an account? This is a personal site — 
          <a href="contact.html" style="color: var(--text-accent);">reach out</a> instead.
        </p>
      </div>

      <!-- Security note -->
      <div style="
        text-align: center;
        margin-top: 1.5rem;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        font-size: 0.78rem;
        color: var(--text-muted);
      ">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        Secured with end-to-end encryption
      </div>
    </div>
  </main>

  <script src="js/main.js"></script>
</body>
</html>
